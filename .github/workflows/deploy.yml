name: Deploy to dsme-server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via jump host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOY_DSME_AI_SERVER }}
          port: ${{ secrets.SSH_PORT }}
          proxy_host: ${{ secrets.SSH_PROXY_HOST }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.DEPLOY_DSME_AI_SERVER }}
          proxy_port: ${{ secrets.SSH_PORT }}
          script: |
            cd /root/partnerall-ai
            git pull origin main
            sudo systemctl restart ai-server
            echo "Deploy complete!"
